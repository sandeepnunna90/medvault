services:
  - type: web
    name: medvault-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements-lock.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
